name: Build PDF Property Validator

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you trigger a build manually from the Actions tab

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: PDFPropertyValidator-Windows
            binary: dist/PDFPropertyValidator.exe
          - os: macos-latest
            artifact: PDFPropertyValidator-macOS
            binary: dist/PDFPropertyValidator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask PyMuPDF pandas openpyxl pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name "PDFPropertyValidator" pdf_checker.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          retention-days: 90
